<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Login & Register</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
width:370px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform: translateY(-20px);}
to{opacity:1; transform: translateY(0);}
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-group{
position:relative;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
}

.error{
color:#ff6b6b;
font-size:12px;
margin-top:5px;
}

button{
width:100%;
padding:12px;
background:#00c6ff;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0072ff;
}

.toggle{
text-align:center;
margin-top:15px;
cursor:pointer;
color:#00c6ff;
font-size:14px;
}

.hidden{
display:none;
}

.show-pass{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:12px;
color:black;
}
</style>
</head>

<body>

<div class="container">

<div id="loginForm">
<h2>Login</h2>

<div class="input-group">
<input type="email" id="loginEmail" placeholder="Email">
<div class="error" id="loginEmailError"></div>
</div>

<div class="input-group">
<input type="password" id="loginPassword" placeholder="Password">
<span class="show-pass" onclick="togglePassword('loginPassword')">Show</span>
<div class="error" id="loginPasswordError"></div>
</div>

<button onclick="loginUser()">Login</button>
<p class="toggle" onclick="showRegister()">Don't have account? Register</p>
</div>

<div id="registerForm" class="hidden">
<h2>Register</h2>

<div class="input-group">
<input type="text" id="regName" placeholder="Full Name">
<div class="error" id="regNameError"></div>
</div>

<div class="input-group">
<input type="email" id="regEmail" placeholder="Email">
<div class="error" id="regEmailError"></div>
</div>

<div class="input-group">
<input type="password" id="regPassword" placeholder="Password">
<span class="show-pass" onclick="togglePassword('regPassword')">Show</span>
<div class="error" id="regPasswordError"></div>
</div>

<button onclick="registerUser()">Register</button>
<p class="toggle" onclick="showLogin()">Already have account? Login</p>
</div>

</div>

<script>
function showRegister(){
document.getElementById("loginForm").classList.add("hidden");
document.getElementById("registerForm").classList.remove("hidden");
clearErrors();
}

function showLogin(){
document.getElementById("registerForm").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
clearErrors();
}

function clearErrors(){
document.querySelectorAll(".error").forEach(e=>e.innerText="");
}

function togglePassword(id){
let input = document.getElementById(id);
if(input.type === "password"){
input.type = "text";
}else{
input.type = "password";
}
}

function registerUser(){
clearErrors();

let name = document.getElementById("regName").value.trim();
let email = document.getElementById("regEmail").value.trim();
let password = document.getElementById("regPassword").value.trim();

let valid = true;

if(name === ""){
document.getElementById("regNameError").innerText = "Full name required";
valid = false;
}

if(email === ""){
document.getElementById("regEmailError").innerText = "Email required";
valid = false;
}

if(password.length < 6){
document.getElementById("regPasswordError").innerText = "Password must be at least 6 characters";
valid = false;
}

if(!valid) return;

// Save to LocalStorage
localStorage.setItem("user", JSON.stringify({name,email,password}));

alert("Registration Successful!");
showLogin();
}

function loginUser(){
clearErrors();

let email = document.getElementById("loginEmail").value.trim();
let password = document.getElementById("loginPassword").value.trim();

let storedUser = JSON.parse(localStorage.getItem("user"));

if(!storedUser){
document.getElementById("loginEmailError").innerText = "No user found. Please register.";
return;
}

if(email !== storedUser.email){
document.getElementById("loginEmailError").innerText = "Email not found";
return;
}

if(password !== storedUser.password){
document.getElementById("loginPasswordError").innerText = "Incorrect password";
return;
}

alert("Login Successful! Welcome " + storedUser.name);
}
</script>

</body>
</html>
